site_name: Software Engineering Mastery Handbook
site_description: A professional-grade collection of architectural patterns, system designs, and algorithmic challenges.
repo_url: https://github.com/Ankur-glitchtracer/docs
site_url: https://Ankur-glitchtracer.github.io/docs/

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

theme:
  name: material
  features:
    - navigation.expand
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

