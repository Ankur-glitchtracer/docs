      - Template: design_patterns/behavioral/template/data_exporter/PROBLEM.md
      - Null Object: design_patterns/behavioral/null_object/discount_system/PROBLEM.md
      - Visitor: design_patterns/behavioral/visitor/PROBLEM.md
      - Mediator: design_patterns/behavioral/mediator/PROBLEM.md
      - Chain of Responsibility: design_patterns/behavioral/chain_of_responsibility/PROBLEM.md
