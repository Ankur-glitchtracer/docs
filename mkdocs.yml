site_name: System Design & LLD Portfolio
site_description: A comprehensive collection of design patterns, machine coding, and distributed systems.
repo_url: https://github.com/yourusername/python-examples # Update this later

docs_dir: docs

site_url: http://127.0.0.1:8000/

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

theme:
  name: material
  features:
    - navigation.expand
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

nav:
  - Home: index.md
  - Progress Tracker: todo.md
  - Documentation Setup: docs_portal.md
  - Design Patterns:
    - Insights: design_patterns/INSIGHTS.md
    - Creational:
      - Abstract Factory: design_patterns/creational/abstract_factory/ui_toolkit/PROBLEM.md
      - Builder: design_patterns/creational/builder/custom_pc_builder/PROBLEM.md
      - Factory (Coupon): design_patterns/creational/factory/coupon_factory/PROBLEM.md
      - Factory (Document): design_patterns/creational/factory/document_factory/PROBLEM.md
      - Singleton: design_patterns/creational/singleton/singleton_pattern/PROBLEM.md
      - Object Pool: design_patterns/creational/object_pool/db_connection_pool/PROBLEM.md
      - Prototype: design_patterns/creational/prototype/PROBLEM.md
    - Structural:
      - Adapter: design_patterns/structural/adapter/format_translator/PROBLEM.md
      - Bridge: design_patterns/structural/bridge/remote_control/PROBLEM.md
      - Composite: design_patterns/structural/composite/organisation_chart/PROBLEM.md
      - Decorator: design_patterns/structural/decorator/pizza_builder_decorator/PROBLEM.md
      - Facade: design_patterns/structural/facade/smart_home_facade/PROBLEM.md
      - Flyweight: design_patterns/structural/flyweight/forest_simulator/PROBLEM.md
      - Proxy: design_patterns/structural/proxy/lazy_loading_proxy/PROBLEM.md
    - Behavioral:
      - Command: design_patterns/behavioral/command/smart_home_hub/PROBLEM.md
      - Interpreter: design_patterns/behavioral/interpreter/rule_engine/PROBLEM.md
      - Iterator: design_patterns/behavioral/iterator/menu_iterator/PROBLEM.md
      - Memento (History): design_patterns/behavioral/memento/text_editor_history/PROBLEM.md
      - Memento (Advanced): design_patterns/behavioral/memento/advanced_text_editor/PROBLEM.md
      - Observer (IoT): design_patterns/behavioral/observer/iot_notification_system/PROBLEM.md
